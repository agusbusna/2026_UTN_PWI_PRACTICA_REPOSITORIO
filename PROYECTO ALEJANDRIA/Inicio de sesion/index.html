<!DOCTYPE html>
<html lang="en">
<head>

    <title>Inicio de Sesion</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <a href="../index.html">Volver atrás</a>
    <form action="">
        <section class="register-form">
            <div>
                <label for="username">
                    <div class="username">Bibliotecarix</div>
                </label>
                <input type="text" id="username" name="username" placeholder="Bibliotecarix">
            </div>
            <div>
                <label for="password">
                    <div class="password">Contraseña</div>
                </label>
                <input type="password" id="password" name="password" required>
            </div>
            <button class="btn-login">Iniciar sesion</button>
        </section>
        


    </form>
</body>
</html>
