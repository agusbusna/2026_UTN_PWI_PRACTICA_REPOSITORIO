<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarea-fixed</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body> 
    <main class="container">
        <div class="kodee-container">
            <div class="float-header">
                <h2><img src="./images/svg width=24 height=24 viewBox=0 0.svg" alt=""> Kodee</h2>
                <button class="icon-btn">
                    <i class="bi bi-chevron-down"></i>
                </button>
            </div>
            <div class="float-banner">
                <span class="status-dot-banner"></span>
                <div class="text-banner">
                    <span>¿Necesitás un sitio web construido por un profesional?</span>
                    <a href="">Explorá el Directorio de Agencias de Hostinger.</a>
                </div>
                <button class="icon-btn"><i class="bi bi-x"></i></button>

            </div>
            <div class="main-screen">
                <div class="welcome-msj">
                    <h3>¿Qué tenés ganas de crear?</h3>
                    <p>Soy Kodee - te voy a encontrar el plan de Hostinger adecuado en menos de 2 minutos.</p>
                </div>
                <div class="action-list">
                    <button class="website-creation-btn">
                        <span class="text-website">Crear mi sitio web</span>
                        <span class="secondary-text">Más popular lleva 2 min</span>
                    </button>
                    <div class="action-list-divider">
                        <span class="divider-line"></span>
                        <span class="secondary-text">o explorar</span>
                        <span class="divider-line"></span>
                    </div>
                    <button class="action-list-btn">
                        <i class="bi bi-lightning-charge"></i> 
                        <span class="secondary-text">Conseguí hosting web</span>
                    </button>
                    <button class="action-list-btn">
                        <i class="bi bi-search"></i>
                        <span class="secondary-text">Encontrá un dominio</span>
                    </button>
                    <button class="action-listo-btn">
                        <i class="bi bi-envelope"></i>
                        <span class="secondary-text">Email profesional</span>
                    </button>
                </div>
            </div>
            <div class="message-input">
                <span class="divider-line__especial"></span>
                <input type="text">
                <i class="bi bi-arrow-up"></i>
            </div>
        </div>


    </main>
    
</body>
</html>
